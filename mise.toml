[tools]
node = "24.16.0"
bun = "1.3.14"
lefthook = "1.11.12"

[tasks.install]
description = "Install project dependencies and git hooks"
run = '''
bun install
lefthook install
'''

[tasks.check]
description = "Run lint, typecheck, and tests"
run = "bun run check"

[tasks.pack-dry]
description = "Verify npm package contents"
run = "npm pack --dry-run"

[tasks.pre-push]
description = "Run the same core validations as the local release flow"
run = '''
bun run check
npm pack --dry-run >/dev/null
'''
